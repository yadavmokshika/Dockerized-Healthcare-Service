version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare-planning-assistant
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Fallbacks or overrides can be specified here
      - ENV=prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

